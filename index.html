<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Throughline Studio — conduct social-science research from A to Z: discover literature, frame questions, build measures, analyze data, and write the paper, in one connected workspace." />
    <title>Throughline Studio — research, A to Z</title>
    <!-- Restore the persisted theme before paint to avoid a flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('syed-theme');
          if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
          else if (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches)
            document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
